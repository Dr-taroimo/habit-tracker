<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fff8ef" />
    <title>習慣トラッカー</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="hero" aria-label="アプリの紹介">
        <div class="hero__copy">
          <p class="hero__eyebrow">今日の小さな積み重ね</p>
          <h1 id="app-title">習慣トラッカー</h1>
          <p>できた日をやさしく残して、続ける気持ちを育てましょう。</p>
        </div>
        <div class="calendar-art" aria-hidden="true">
          <span class="calendar-art__ring calendar-art__ring--left"></span>
          <span class="calendar-art__ring calendar-art__ring--right"></span>
          <span class="calendar-art__top"></span>
          <span class="calendar-art__dot"></span>
          <span class="calendar-art__dot"></span>
          <span class="calendar-art__dot"></span>
          <span class="calendar-art__check"></span>
        </div>
      </section>

      <section class="panel" aria-labelledby="add-heading">
        <div class="panel__heading">
          <div>
            <p class="section-kicker">まずはひとつ</p>
            <h2 id="add-heading">今日の習慣</h2>
          </div>
          <span class="mini-icon mini-icon--spark" aria-hidden="true"></span>
        </div>
        <form class="add-form" id="habit-form">
          <label class="sr-only" for="habit-input">習慣名</label>
          <input
            id="habit-input"
            name="habit"
            type="text"
            autocomplete="off"
            maxlength="40"
            placeholder="例: 朝に水を飲む"
          />
          <button class="button button--mint" type="submit">習慣を追加</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="notify-heading">
        <div class="panel__heading">
          <div>
            <p class="section-kicker">開いている間にお知らせ</p>
            <h2 id="notify-heading">毎日の通知</h2>
          </div>
          <span class="mini-icon mini-icon--bell" aria-hidden="true"></span>
        </div>
        <div class="time-row">
          <label>
            <span>時</span>
            <input id="notify-hour" inputmode="numeric" maxlength="2" aria-label="通知する時" />
          </label>
          <label>
            <span>分</span>
            <input id="notify-minute" inputmode="numeric" maxlength="2" aria-label="通知する分" />
          </label>
        </div>
        <div class="setting-row">
          <label class="switch">
            <input id="sound-toggle" type="checkbox" />
            <span></span>
            効果音
          </label>
          <button class="button button--sky" id="permission-button" type="button">通知を許可</button>
          <button class="button button--lemon" id="save-time-button" type="button">時刻を保存</button>
        </div>
        <p class="notice" id="notice" role="status" aria-live="polite"></p>
      </section>

      <section class="habits-section" aria-labelledby="habits-heading">
        <div class="list-title">
          <h2 id="habits-heading">習慣の一覧</h2>
          <button class="text-button" id="clear-button" type="button">すべて削除</button>
        </div>
        <div class="habits" id="habits"></div>
      </section>
    </main>

    <template id="habit-template">
      <article class="habit-card">
        <div class="habit-card__top">
          <span class="status-mark" aria-hidden="true"></span>
          <div>
            <h3></h3>
            <p class="habit-card__state"></p>
          </div>
        </div>
        <div class="stats">
          <span class="pill pill--mint"></span>
          <span class="pill pill--lemon"></span>
        </div>
        <p class="week-label">直近7日間</p>
        <div class="week-dots"></div>
        <button class="button button--coral habit-card__button" type="button"></button>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
